services:
  app:
    image: gerador-senhas:latest
    container_name: gerador-senhas-app
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      SITE_NAME: ${SITE_NAME:-Gerador de Senhas}
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    mem_limit: 256m
    cpus: 1.0

  caddy:
    image: caddy:2-alpine
    container_name: gerador-senhas-caddy
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 100
    mem_limit: 128m
    cpus: 0.50
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
